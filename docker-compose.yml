services:
  muma-backend:
    image: portholeteam/muma-backend:latest
    build: .
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
